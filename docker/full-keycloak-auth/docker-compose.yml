# complete docker compose with geovisio backend, a database, some pictures workers and keycloak based authentication
# * All is accessible through http://localhost:8080 (using a reverse proxy to dispatch to all services)
#
# Some key variables can be changed by providing a `.env` file or environment variables to docker compose
# and feel free to change more configuration directly in this file if needed.
#
# Since this is aimed at serving an identity provider alongside goevisio, this MUST be run behind a proxy handling TLS
# and served on a domain defined in the `.env` file as DOMAIN
#
# Note: if the port 8080 is alreay binded on your system, change it in this file
#
# The ${SERVICE_PASSWORD_64_*} references below are Coolify "magic" environment
# variables, auto-generated the first time the compose file is loaded. See configuration_options.md (Secrets)
# and backup_and_restore_instructions.md for how they work and the restore caveat.

x-base-geovisio: &geovisio-default
  image: panoramax/api:${GEOVISIO_IMAGE_TAG:-latest}

x-base-geovisio-env:
  &geovisio-default-env # Override the FS_URL default baked into the pre-built image; the split S3 variables are used instead
  FS_URL: ""

x-base-keycloak: &keycloak-build
  build:
    context: .
    dockerfile: Dockerfile.keycloak

services:
  # One-shot: imports keycloak-realm.json into a fresh/empty keycloak schema,
  # then exits. Split out from `auth`'s own startup because `start
  # --import-realm` triggers Keycloak's own internal server restart after
  # import completes — normally harmless (the next boot finds the realm
  # already there and skips re-importing), but on a fresh deploy that
  # self-restart can happen before the import's DB write actually commits,
  # so the next boot still finds no realm, imports again, restarts again,
  # forever. Running the import here as a plain `kc.sh import` (non-server
  # mode, same pattern as keycloak-export) avoids that restart path
  # entirely; `auth` then starts normally with the realm already present.
  keycloak-import:
    <<: *keycloak-build
    command: import --optimized --file /opt/keycloak/data/import/geovisio_realm.json --override false
    restart: "no"
    exclude_from_hc: true
    environment:
      # Placeholders in keycloak-realm.json
      GEOVISIO_BASE_URL: https://${DOMAIN:?}
      GEOVISIO_CLIENT_SECRET: ${SERVICE_PASSWORD_64_OAUTH_CLIENT_SECRET}
      KC_DB_USERNAME: keycloak_user
      KC_DB_PASSWORD: ${SERVICE_PASSWORD_64_KC_DB_PASSWORD}
      KC_DB_SCHEMA: keycloak
      KC_DB_URL: jdbc:postgresql://db/geovisio
    depends_on:
      db:
        condition: service_healthy

  auth:
    <<: *keycloak-build
    command: start --optimized
    labels:
      - "traefik.enable=false"
    environment:
      # Keycloak admin account
      KC_BOOTSTRAP_KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_KEYCLOAK_ADMIN_PASSWORD: ${SERVICE_PASSWORD_64_KEYCLOAK_ADMIN_PASSWORD}

      # Database connection
      # note: keycloak uses the same database as geovisio, in a separate schema, this way there is only 1 database to backup
      KC_DB_USERNAME: keycloak_user
      KC_DB_PASSWORD: ${SERVICE_PASSWORD_64_KC_DB_PASSWORD}
      KC_DB_SCHEMA: keycloak
      KC_DB_URL: jdbc:postgresql://db/geovisio

      # Tell keycloak to trust nginx X-Forwarded headers
      KC_PROXY_HEADERS: xforwarded
      # It's fine to use http, the reverse proxy handle the tls termination
      KC_HTTP_ENABLED: true
      # trust nginx to set the correct xforwarded headers with the hostname
      KC_HOSTNAME_STRICT: false
      # Enable health endpoint on management port (9000) at /health/ready
      KC_HTTP_MANAGEMENT_HEALTH_ENABLED: "true"

      # SMTP is not configured here — the realm imports with an empty
      # smtpServer, and email features (password reset, verification) won't
      # work until an admin sets SMTP up manually in the Keycloak console
      # (Realm settings > Email). Keeping it out of the automated realm
      # import avoids Keycloak's strict validation of smtpServer.from as a
      # real email address, which previously hard-failed import whenever
      # SMTP wasn't configured. A real disaster-recovery restore brings back
      # whatever SMTP config production actually had via the DB restore
      # (see backup_and_restore_instructions.md) — this only affects a
      # from-scratch first deploy.

      # tell keycloak that it will be /oauth prefix by nginx
      KC_HOSTNAME_PATH: /oauth
      # KEYCLOAK_TEMPLATES_DIR: ./themes/ # you can load theme if you want
    depends_on:
      db:
        condition: service_healthy
      keycloak-import:
        condition: service_completed_successfully
    healthcheck:
      # Health endpoints are not reliably available in this Keycloak 26 build.
      # This used to send a real GET to /oauth/realms/master and check for a
      # 200 (proving the DB is up, the realm is loaded, and Keycloak is
      # actually serving) — but that only succeeds once realm import fully
      # finishes, and observed startup + import time exceeded some restart
      # supervisor's timeout on Coolify (well under docker-compose's own
      # start_period), causing an endless restart loop before the app ever
      # got a chance to become ready. Downgraded to a bare TCP-connect check,
      # which succeeds as soon as the port is listening — a liveness check,
      # not a true readiness check. Dependents (e.g. website) may see a few
      # seconds of 503s from auth immediately after it's marked healthy.
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080 && exec 3<&-"]
      timeout: 5s
      interval: 5s
      retries: 5
      start_period: 60s

  # Periodically runs `kc.sh export` against the same DB, without needing the
  # live HTTP server — see backup/backup_architecture.md. Its output on
  # kc_export is picked up by backup-config.sh alongside the secrets it
  # already ships.
  keycloak-export:
    <<: *keycloak-build
    entrypoint: ["/usr/local/bin/keycloak-export-loop.sh"]
    restart: unless-stopped
    exclude_from_hc: true
    labels:
      - "traefik.enable=false"
    # Gated on keycloak-import completing (not auth's health) so it never
    # races the realm import — service_completed_successfully is a safe hard
    # dependency here since keycloak-import is a one-shot job that reliably
    # terminates, unlike gating on auth's own (known-flaky) healthcheck.
    # keycloak-export-loop.sh also retries internally as a defensive fallback.
    depends_on:
      db:
        condition: service_healthy
      keycloak-import:
        condition: service_completed_successfully
    environment:
      # Only the DB connection is needed — no HTTP/proxy/SMTP config, since the
      # live server isn't involved.
      KC_DB_USERNAME: keycloak_user
      KC_DB_PASSWORD: ${SERVICE_PASSWORD_64_KC_DB_PASSWORD}
      KC_DB_SCHEMA: keycloak
      KC_DB_URL: jdbc:postgresql://db/geovisio
      KC_EXPORT_INTERVAL_SECONDS: ${KC_EXPORT_INTERVAL_SECONDS:-86400}
    # Named volumes are root-owned by default; Keycloak's image runs as uid 1000,
    # which can't write to /export otherwise. This container never listens on a
    # port and only invokes the CLI export, so running as root is low-risk here.
    user: "0:0"
    volumes:
      - kc_export:/export

  migrations:
    <<: *geovisio-default
    command: db-upgrade
    restart: "no"
    exclude_from_hc: true
    environment:
      <<: *geovisio-default-env
      DB_URL: postgres://gvs:${SERVICE_PASSWORD_64_PG_PASSWORD}@db/geovisio
    depends_on:
      db:
        condition: service_healthy

  api:
    <<: *geovisio-default
    command: ssl-api
    labels:
      - "traefik.enable=false"
    depends_on:
      db:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    environment:
      <<: *geovisio-default-env
      OAUTH_PROVIDER: oidc
      OAUTH_CLIENT_ID: geovisio
      OAUTH_CLIENT_SECRET: ${SERVICE_PASSWORD_64_OAUTH_CLIENT_SECRET}
      OAUTH_OIDC_URL: https://${DOMAIN:?}/oauth/realms/geovisio
      DB_URL: postgres://gvs:${SERVICE_PASSWORD_64_PG_PASSWORD}@db/geovisio
      FLASK_SECRET_KEY: ${SERVICE_PASSWORD_64_FLASK_SECRET_KEY}
      FLASK_SESSION_COOKIE_DOMAIN: ${DOMAIN:-localhost}
      API_FORCE_AUTH_ON_UPLOAD: True
      API_PICTURES_LICENSE_SPDX_ID: CC-BY-SA-4.0 # default pictures's license, change it if needed
      API_PICTURES_LICENSE_URL: https://spdx.org/licenses/CC-BY-SA-4.0.html
      API_BLUR_URL: ${BLUR_API:-https://blur.panoramax.openstreetmap.fr}
      API_DERIVATES_PICTURES_PUBLIC_URL: ${S3_DERIVATES_PUBLIC_URL:?}
      API_PERMANENT_PICTURES_PUBLIC_URL: ${S3_PERMANENT_PUBLIC_URL:?}
      PICTURE_PROCESS_THREADS_LIMIT: 0
      PICTURE_PROCESS_DERIVATES_STRATEGY: PREPROCESS
      FS_TMP_URL: ${FS_TMP_URL:?}
      FS_PERMANENT_URL: ${FS_PERMANENT_URL:?}
      FS_DERIVATES_URL: ${FS_DERIVATES_URL:?}
      NB_API_THREADS: 10
      # Default 2: Traefik (Coolify) + nginx (reverseproxy) both set X-Forwarded-For before reaching the API
      INFRA_NB_PROXIES: ${INFRA_NB_PROXIES:-2}
      # API SUMMARY regroup many metadata about the instance
      # check the documentation on how translations are handled: https://docs.panoramax.fr/backend/install/settings/#metadata
      API_SUMMARY: >-
        {
          "color": "#abcdef",
          "description": {"en": "a long description", "fr": "une description longue"},
          "logo": "https://gitlab.com/panoramax/gitlab-profile/-/raw/main/images/logo.svg", 
          "email": "the_administrator@mypanoramax.org",
          "name": {"en": "${INSTANCE_NAME:-A Panoramax instance}", "fr": "Mon petit serveur des familles"},
          "geo_coverage": {"en": "Anywhere you like", "fr": "Partout où le vent vous portera"}
        }
      API_REGISTRATION_IS_OPEN: ${API_REGISTRATION_IS_OPEN:-False} # True if the instance is open to registration, False if not, it is only used in the federation for the moment
    ports:
      - 5000
    healthcheck:
      test: python -c "import requests; requests.get('http://localhost:5000/api').raise_for_status()"
      interval: 4s
      timeout: 5s
      retries: 10
      start_period: 1s
    restart: always

  website:
    image: panoramax/website:${WEBSITE_IMAGE_TAG:-latest}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    environment:
      # documentation for configuration: https://docs.panoramax.fr/website/03_Settings/
      VITE_INSTANCE_NAME: ${INSTANCE_NAME:-A Panoramax instance}
      VITE_API_URL: /
      VITE_TILES: https://panoramax.openstreetmap.fr/pmtiles/basic.json
      # optional metadata
      # The title for the <title> tag of the HTML
      VITE_TITLE: "${VITE_TITLE:-My Panoramax: The free alternative to photo-mapping territories}"
      # The title for the meta tags.
      VITE_META_TITLE: "${VITE_META_TITLE:-My Panoramax: The free alternative to photo-mapping territories}"
      # The description for meta tags, which is useful for SEO.
      VITE_META_DESCRIPTION: "${VITE_META_DESCRIPTION:-Panoramax is a digital resource for sharing and using field photos. Anyone can take photographs of places visible from public roads and contribute them to the Panoramax database.}"
    ports:
      - 3000
    restart: always

  # Background workers used to process pictures in the background
  # calling the blur API and generating derivates (SD picture and tiles for faster rendering in photosphereviewer)
  # Several background workers can run together — add or remove numbered services below to adjust the count.
  # Note: the blurring is configured to be done using the OSM-FR service, you can change the variable `API_BLUR_URL` if needed (in the API too).
  background-worker-1: &worker-default
    <<: *geovisio-default
    command: picture-worker
    exclude_from_hc: true
    labels:
      - "traefik.enable=false"
    depends_on:
      db:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    restart: always
    environment:
      <<: *geovisio-default-env
      PICTURE_PROCESS_DERIVATES_STRATEGY: PREPROCESS
      DB_URL: postgres://gvs:${SERVICE_PASSWORD_64_PG_PASSWORD}@db/geovisio
      FS_TMP_URL: ${FS_TMP_URL:?}
      FS_PERMANENT_URL: ${FS_PERMANENT_URL:?}
      FS_DERIVATES_URL: ${FS_DERIVATES_URL:?}
      API_BLUR_URL: https://blur.panoramax.openstreetmap.fr

  background-worker-2:
    <<: *worker-default

  background-worker-3:
    <<: *worker-default

  background-worker-4:
    <<: *worker-default

  reverseproxy:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    ports:
      - 80
    restart: always
    depends_on:
      api:
        condition: service_healthy
      auth:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/api || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  db:
    environment:
      POSTGRES_DB: geovisio
      POSTGRES_PASSWORD: ${SERVICE_PASSWORD_64_PG_PASSWORD}
      POSTGRES_USER: gvs
      KC_DB_PASSWORD: ${SERVICE_PASSWORD_64_KC_DB_PASSWORD}
    healthcheck:
      test: pg_isready -h db -q -d $$POSTGRES_DB -U $$POSTGRES_USER
      timeout: 5s
      interval: 5s
      retries: 5
      start_period: 5s
    build:
      context: .
      dockerfile: Dockerfile.postgres
    ports:
      - 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    restart: always

  # See backup/backup_architecture.md for how this works: restic (Postgres,
  # Keycloak export, secrets) + rclone (permanent pictures) driven by supercronic.
  backup:
    build: ./backup
    restart: unless-stopped
    init: true # tini as PID 1; supercronic runs with -no-reap (see entrypoint.sh)
    depends_on: [db]
    environment:
      PG_PASSWORD: ${SERVICE_PASSWORD_64_PG_PASSWORD}
      # Hardcoded, not Coolify-settable: Coolify injects app-level env vars
      # into ALL services, so a PGHOST set here previously broke db's own init script.
      PGHOST: db
      PGUSER: gvs
      OAUTH_CLIENT_SECRET: ${SERVICE_PASSWORD_64_OAUTH_CLIENT_SECRET}
      FLASK_SECRET_KEY: ${SERVICE_PASSWORD_64_FLASK_SECRET_KEY}
      KC_DB_PASSWORD: ${SERVICE_PASSWORD_64_KC_DB_PASSWORD}
      KEYCLOAK_ADMIN_PASSWORD: ${SERVICE_PASSWORD_64_KEYCLOAK_ADMIN_PASSWORD}
      FS_PERMANENT_URL: ${FS_PERMANENT_URL:?} # reused from the api/background-worker config
      RESTIC_PASSWORD: ${RESTIC_PASSWORD:?}
      RESTIC_REPOSITORY: s3:${BACKUP_S3_ENDPOINT:?}/${BACKUP_S3_BUCKET:?}/restic
      AWS_ACCESS_KEY_ID: ${BACKUP_S3_ACCESS_KEY:?} # restic's S3 backend reads these names
      AWS_SECRET_ACCESS_KEY: ${BACKUP_S3_SECRET_KEY:?}
      AWS_DEFAULT_REGION: ${BACKUP_S3_REGION}
      BACKUP_S3_ACCESS_KEY: ${BACKUP_S3_ACCESS_KEY:?} # used directly by backup-images.sh (rclone)
      BACKUP_S3_SECRET_KEY: ${BACKUP_S3_SECRET_KEY:?}
      BACKUP_S3_ENDPOINT: ${BACKUP_S3_ENDPOINT:?}
      BACKUP_S3_REGION: ${BACKUP_S3_REGION}
      BACKUP_S3_BUCKET: ${BACKUP_S3_BUCKET:?}
      BACKUP_CRON_IMAGES: ${BACKUP_CRON_IMAGES:-0 2 * * *}
      BACKUP_CRON_DB: ${BACKUP_CRON_DB:-30 2 * * *}
      BACKUP_CRON_CONFIG: ${BACKUP_CRON_CONFIG:-45 2 * * *}
      BACKUP_CRON_CHECK: ${BACKUP_CRON_CHECK:-0 4 * * 0}
      RESTIC_KEEP_DAILY: ${RESTIC_KEEP_DAILY:-7}
      RESTIC_KEEP_WEEKLY: ${RESTIC_KEEP_WEEKLY:-5}
      RESTIC_KEEP_MONTHLY: ${RESTIC_KEEP_MONTHLY:-12}
    healthcheck:
      test: ["CMD", "backup-healthcheck.sh"]
      interval: 1h
      timeout: 10s
      retries: 1
      start_period: 26h
    volumes:
      - backup_scratch:/backups
      - kc_export:/backups/keycloak:ro # populated by keycloak-export

volumes:
  postgres_data:
    name: geovisio_auth_postgres_data
  backup_scratch:
  kc_export:
